spring:
  application:
    name: indras-backend
  datasource:
    url: jdbc:h2:mem:indras;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

server:
  port: 8080

jwt:
  secret: indras-demo-jwt-secret-key-change-in-production
  expire-seconds: 7200

ai-service:
  base-url: http://localhost:8000
  internal-token: change-me

demo-data:
  enabled: true
