spring:
  application:
    name: indras-backend
  datasource:
    url: jdbc:mysql://localhost:3306/food_management?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 8080

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.indras.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: indras-demo-jwt-secret-key-change-in-production
  expire-seconds: 7200

storage:
  upload-dir: uploads

ai-service:
  base-url: http://localhost:8000
  internal-token: change-me
  connect-timeout-ms: 10000
  read-timeout-ms: 120000

demo-data:
  enabled: true
